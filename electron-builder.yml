# ============================================================================
# Configuración de electron-builder — genera instaladores nativos.
#   Windows: NSIS (.exe)   |   macOS: .dmg   |   Linux: .AppImage
#
# `asarUnpack` extrae los binarios nativos (ffmpeg, sharp…) fuera del asar
# para que puedan ejecutarse como procesos externos.
# `publish` apunta a GitHub Releases: electron-updater lo usa para el
# auto-update (sube los artefactos con `electron-builder --publish always`).
# ============================================================================
appId: com.pedromendez.escalador
productName: Escalador
copyright: Copyright © 2026 Pedro Méndez

directories:
  buildResources: resources
  output: dist

files:
  - out/**
  - resources/icon.png
  - python/**
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!{.eslintrc,.gitignore,electron.vite.config.ts,electron-builder.yml}'

asarUnpack:
  - node_modules/ffmpeg-static/**
  - node_modules/ffprobe-static/**
  - node_modules/sharp/**
  - node_modules/@img/**
  - resources/**

win:
  executableName: Escalador
  icon: resources/icon.png
  target:
    - target: nsis
      arch: [x64]

nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always

mac:
  icon: resources/icon.png
  category: public.app-category.video
  target:
    - target: dmg
      arch: [x64, arm64]
  # Sin campo "identity": electron-builder autodescubre el certificado a
  # usar en el llavero (CSC_IDENTITY_AUTO_DISCOVERY, activado por defecto),
  # acotado por la variable de entorno CSC_NAME. El workflow de CI genera
  # un certificado autofirmado efímero (gratuito, sin cuenta de Apple
  # Developer) e importado al llavero del runner antes de este paso — ver
  # ".github/workflows/build.yml", paso "Certificado de firma ad-hoc".
  # Con un certificado real (aunque autofirmado) en el llavero,
  # electron-builder SÍ ejecuta su pipeline de firma completo sobre todos
  # los componentes anidados (Electron Framework, procesos Helper…) en el
  # orden correcto — algo que ni identity: null (salta la firma) ni
  # identity: "-" (electron-builder la busca como nombre de certificado y,
  # al no existir, también la salta) ni un `codesign --deep` manual a
  # posteriori consiguen. Sin ninguna firma válida, Apple Silicon (M1-M5)
  # se niega directamente a abrir la app ("está dañada").
  gatekeeperAssess: false
  # Permisos necesarios para leer/escribir archivos seleccionados por el usuario
  extendInfo:
    NSDocumentsFolderUsageDescription: Escalador necesita acceso para convertir tus archivos.
    NSDownloadsFolderUsageDescription: Escalador guarda las descargas en esta carpeta.

dmg:
  # ${arch} es obligatorio aquí: al compilar x64 y arm64 en paralelo, si
  # ambos comparten nombre de archivo, los dos "hdiutil convert" escriben
  # al mismo .dmg simultáneamente y el proceso falla ("resource busy").
  artifactName: ${name}-${version}-${arch}.${ext}

linux:
  icon: resources/icon.png
  category: AudioVideo
  target:
    - target: AppImage
      arch: [x64]

appImage:
  artifactName: ${name}-${version}.${ext}

npmRebuild: true

publish:
  provider: github
  owner: pmendez92
  repo: escalador
